<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD MEGA MERIAH! 🎉💖</title>
    <style>
        /* TEMA ULTRA MEGA MERIAH & HEBOH */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffeef2;
            background-image: linear-gradient(120deg, #ff9a9e 0%, #fad0c4 30%, #fbc2eb 60%, #a18cd1 100%);
            background-size: 400% 400%;
            animation: rainbowShift 10s ease infinite;
            
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* Mencegah layar geser kanan-kiri di HP */
            position: relative;
            box-sizing: border-box;
        }

        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- DEKORASI LATAR BELAKANG --- */
        .bg-text {
            position: absolute;
            font-size: 18vw;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.12);
            z-index: 0;
            user-select: none;
            pointer-events: none;
            animation: pulseText 3s infinite ease-in-out;
        }
        .bg-text.left { left: -5%; top: 15%; transform: rotate(-15deg); }
        .bg-text.right { right: -5%; bottom: 15%; transform: rotate(15deg); }

        @keyframes pulseText {
            0%, 100% { opacity: 0.1; transform: scale(1) rotate(-15deg); }
            50% { opacity: 0.2; transform: scale(1.05) rotate(-10deg); }
        }

        .bunting {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px; /* Ukuran disesuaikan agar tidak menutupi konten di HP */
            background-image: url('https://img.icons8.com/color/96/bunting-flag.png');
            background-repeat: repeat-x;
            background-size: contain;
            z-index: 5;
            opacity: 0.8;
        }

        /* Container Utama yang Responsif di HP */
        .card {
            background: rgba(255, 255, 255, 0.97);
            border: 6px solid; /* Sedikit lebih tipis di HP agar space luas */
            border-image: linear-gradient(45deg, #ff6b8b, #ffeead, #6bffff, #ff6b8b) 1;
            border-radius: 20px;
            padding: 25px 20px; /* Padding lebih aman untuk HP kecil */
            width: 88%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(255, 20, 147, 0.5);
            position: relative;
            z-index: 10;
            margin: 40px 0; /* Memberi jarak atas bawah di HP */
            animation: cardPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .header-icons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        .icon-cute {
            width: 50px; /* Diperkecil sedikit agar pas di HP */
            height: auto;
            animation: wobbleCrazy 1.5s infinite linear;
        }
        .icon-cute.delay { animation-delay: 0.3s; }

        @keyframes wobbleCrazy {
            0%, 100% { transform: rotate(-10deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.05); }
        }

        h1 {
            color: #ff1493;
            font-size: 24px; /* Ukuran teks judul pas untuk HP */
            margin: 5px 0 10px;
            text-shadow: 2px 2px 0px rgba(255, 107, 139, 0.3);
            background: linear-gradient(45deg, #ff6b8b, #ff1493, #ff6b8b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 2s linear infinite;
        }

        @keyframes shineText { to { background-position: 200% center; } }

        /* Bingkai Foto Fleksibel (Tidak akan pecah/keluar layar) */
        .photo-container {
            width: 180px;  /* Ukuran disesuaikan untuk layar HP */
            height: 180px;
            margin: 15px auto;
            border-radius: 50%;
            border: 8px solid #ff8da1;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .photo-container::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            animation: shineFast 2s infinite;
        }

        @keyframes shineFast {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Teks Ucapan Responsif */
        p#ucapan {
            color: #333;
            font-size: 15px; /* Sedikit lebih kecil agar nyaman dibaca di HP */
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: bold;
            padding: 0 5px;
        }

        /* Tombol yang Pas Ditap Jari */
        .btn {
            background: linear-gradient(45deg, #ff4081, #ff6b8b, #ffebbc, #ff4081);
            background-size: 300% 100%;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 64, 129, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%; /* Tombol memenuhi lebar kartu di HP agar mudah diklik */
            box-sizing: border-box;
            animation: buttonPulse 1.5s infinite;
        }

        @keyframes buttonPulse {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; transform: scale(1.02); }
            100% { background-position: 0% 50%; }
        }

        /* --- ANIMASI JATUH & TERBANG --- */
        .confetti {
            position: absolute;
            opacity: 0.9;
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

        .floating-deco {
            position: absolute;
            animation: floatUpHEBOH 8s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes floatUpHEBOH {
            0% { transform: translateY(110vh) translateX(0) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 0.7; scale: 1; }
            50% { transform: translateY(50vh) translateX(-20px) rotate(180deg) scale(1); }
            90% { opacity: 0.7; scale: 1; }
            100% { transform: translateY(-15vh) translateX(20px) rotate(360deg) scale(0.5); opacity: 0; }
        }

        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 11;
            opacity: 0;
        }

        /* Penyesuaian khusus untuk layar HP yang sangat kecil */
        @media (max-width: 360px) {
            h1 { font-size: 20px; }
            .photo-container { width: 150px; height: 150px; }
            p#ucapan { font-size: 14px; }
            .btn { font-size: 13px; padding: 12px 20px; }
        }
    </style>
</head>
<body>

    <div class="bunting"></div>
    <div class="bg-text left">HBD</div>
    <div class="bg-text right">HBD</div>
    <div id="bg-decoration"></div>

    <div class="card" id="mainCard">
        <div class="header-icons">
            <img class="icon-cute" src="https://img.icons8.com/color/120/birthday-cake.png" alt="Kue Ultah">
            <img class="icon-cute delay" src="https://img.icons8.com/color/120/balloons.png" style="width: 55px;" alt="Balon Heboh">
            <img class="icon-cute" src="https://img.icons8.com/color/120/party-loudspeaker.png" alt="Toa Pesta">
        </div>
        
        <h1>HAPPY BIRTHDAY!! 🎂</h1>
        
        <div class="photo-container">
            <!-- GANTI tulisan di src="..." di bawah dengan nama file fotomu yang ada di github -->
            <img src="bubub.jpeg" alt="Foto Ulang Tahun" onerror="this.src='https://placehold.co/230x230/ff6b8b/ffffff?text=FOTO+MERIAH'">
        </div>

        <p id="ucapan">Waaaah! Selamat ulang tahun ya! Semoga harimu MEGA DUUPER ceria, penuh kejutan manis, dan semua keinginanmu terkabul! 💖✨🎁</p>

        <button class="btn" onclick="startMEGA_Celebration()">KLIK UNTUK KEJUTAN TOTAL!!! 🎉</button>
    </div>

    <script>
        window.onload = function() {
            createBackgroundEffects();
        };

        function createBackgroundEffects() {
            const container = document.getElementById('bg-decoration');
            const decoImages = [
                'https://img.icons8.com/color/96/balloons.png',
                'https://img.icons8.com/color/96/birthday-hat.png',
                'https://img.icons8.com/color/96/gift.png',
                'https://img.icons8.com/color/96/wrapped-gift.png',
                'https://img.icons8.com/color/96/confetti.png',
                'https://img.icons8.com/color/96/lollipop.png',
                'https://img.icons8.com/color/96/star--v1.png'
            ];
            
            // Jumlah disesuaikan agar HP tidak patah-patah/lag
            for (let i = 0; i < 15; i++) {
                const deco = document.createElement('img');
                deco.src = decoImages[Math.floor(Math.random() * decoImages.length)];
                deco.className = 'floating-deco';
                deco.style.left = Math.random() * 90 + 'vw';
                deco.style.animationDelay = Math.random() * 6 + 's';
                deco.style.animationDuration = (Math.random() * 4 + 6) + 's'; 
                deco.style.width = (Math.random() * 20 + 25) + 'px'; 
                container.appendChild(deco);
            }

            for (let i = 0; i < 40; i++) {
                createConfetti(false);
            }
        }

        function createConfetti(isExplosion) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            const colors = ['#ff4081', '#ff6b8b', '#ffeead', '#6bffff', '#ffae19', '#b57cff'];
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            if (isExplosion) {
                confetti.style.left = '50%';
                confetti.style.top = '50%';
                const size = Math.random() * 6 + 6;
                confetti.style.width = size + 'px';
                confetti.style.height = size + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 250 + 100; // Jangkauan ledakan disesuaikan layar HP
                const destX = Math.cos(angle) * velocity;
                const destY = Math.sin(angle) * velocity;
                
                confetti.animate([
                    { transform: 'translate(-50%, -50%) translate(0, 0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(-50%, -50%) translate(${destX}px, ${destY}px) rotate(${Math.random()*720}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 1000 + 1000,
                    easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)'
                });
                
                setTimeout(() => confetti.remove(), 2000);
            } else {
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = -20 + 'px';
                const size = Math.random() * 6 + 5;
                confetti.style.width = size + 'px';
                confetti.style.height = size + 'px';
                confetti.style.animationDuration = (Math.random() * 3 + 3) + 's';
                confetti.style.animationDelay = Math.random() * 5 + 's';
            }
            
            document.body.appendChild(confetti);
        }

        function launchFirework(card) {
            const colors = ['#ff4081', '#6bffff', '#ffff00', '#32cd32'];
            const startX = Math.random() * 80 + 10;
            const startY = Math.random() * 50 + 20;

            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = startX + '%';
                particle.style.top = startY + '%';
                card.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 40 + 20;
                const destX = Math.cos(angle) * velocity;
                const destY = Math.sin(angle) * velocity;

                particle.animate([
                    { transform: 'translate(0, 0)', opacity: 1 },
                    { transform: `translate(${destX}px, ${destY}px)`, opacity: 0 }
                ], {
                    duration: Math.random() * 400 + 600,
                    easing: 'ease-out'
                });

                setTimeout(() => particle.remove(), 1000);
            }
        }

        function startMEGA_Celebration() {
            document.getElementById('ucapan').innerHTML = "<b>CIEEEEE! MAKIN TUA MAKIN KECE BOMBAT! 🥳🎉</b><br>Met ultah ya Mputt yg cantik dan manis! Semoga panjang umur, sehat selalu, banyak rejeki, tetap imut, manis, bahagia, jgn sampe ada kesedihan nantinya POKOKNYA WISH YOU ALL THE BEST! 🎂🎈🎁✨🤍";
            
            for (let i = 0; i < 150; i++) {
                createConfetti(true);
            }

            const card = document.getElementById('mainCard');
            launchFirework(card);
            setTimeout(() => launchFirework(card), 300);
            
            card.animate([
                { transform: 'translate(1px, 1px) rotate(0deg)' },
                { transform: 'translate(-1px, -2px) rotate(-1deg)' },
                { transform: 'translate(1px, -1px) rotate(1deg)' }
            ], {
                duration: 300,
                iterations: 1
            });
        }
    </script>
</body>
</html>
